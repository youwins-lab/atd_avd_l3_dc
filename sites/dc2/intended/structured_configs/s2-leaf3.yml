aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1
  description: MLAG_s2-leaf4_Ethernet1
  shutdown: false
  channel_group:
    id: 1000
    mode: active
  metadata:
    peer: s2-leaf4
    peer_interface: Ethernet1
    peer_type: mlag_peer
- name: Ethernet6
  description: MLAG_s2-leaf4_Ethernet6
  shutdown: false
  channel_group:
    id: 1000
    mode: active
  metadata:
    peer: s2-leaf4
    peer_interface: Ethernet6
    peer_type: mlag_peer
- name: Ethernet2
  description: P2P_s2-spine1_Ethernet4
  shutdown: false
  mtu: 9214
  ip_address: 10.255.1.201/31
  metadata:
    peer: s2-spine1
    peer_interface: Ethernet4
    peer_type: spine
  switchport:
    enabled: false
- name: Ethernet3
  description: P2P_s2-spine2_Ethernet4
  shutdown: false
  mtu: 9214
  ip_address: 10.255.1.203/31
  metadata:
    peer: s2-spine2
    peer_interface: Ethernet4
    peer_type: spine
  switchport:
    enabled: false
- name: Ethernet4
  description: SERVER_s2-host2_Ethernet1
  shutdown: false
  channel_group:
    id: 4
    mode: active
  metadata:
    peer: s2-host2
    peer_interface: Ethernet1
    peer_type: server
    peer_key: servers
hostname: s2-leaf3
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:00:01
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.1.0.115/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.1.1.115/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: default
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.24/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: ceos
  fabric_name: dc2_fabric
mlag_configuration:
  domain_id: LeafPair2
  local_interface: Vlan4094
  peer_address: 192.0.0.229
  peer_link: Port-Channel1000
port_channel_interfaces:
- name: Port-Channel1000
  description: MLAG_s2-leaf4_Port-Channel1000
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel4
  description: SERVER_s2-host2
  shutdown: false
  mlag: 4
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 10,20
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.1.0.0/24 eq 32
  - sequence: 20
    action: permit 10.1.1.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 192.2.2.228/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65102'
  router_id: 10.1.0.115
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp_defaults:
  - no bgp default ipv4-unicast
  - distance bgp 20 200 200
  - neighbor default send-community
  - graceful-restart restart-time 300
  - graceful-restart
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPV4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65102'
    description: s2-leaf4
    next_hop_self: true
    password: 96Yo/G3L+2RCoAD4Cy/2Ew==
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPV4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    password: X/OrLne2MxtUwJOXyoEcEw==
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-LOCAL-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    password: HwsUtvRBaFIOmUOBhrtIfQ==
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 192.1.1.229
    peer_group: MLAG-IPV4-UNDERLAY-PEER
    metadata:
      peer: s2-leaf4
    description: s2-leaf4_Vlan4093
  - ip_address: 10.255.1.200
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: s2-spine1
    description: s2-spine1_Ethernet4
  - ip_address: 10.255.1.202
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: s2-spine2
    description: s2-spine2_Ethernet4
  - ip_address: 10.1.0.110
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65100'
    metadata:
      peer: s2-spine1
    description: s2-spine1_Loopback0
  - ip_address: 10.1.0.112
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65100'
    metadata:
      peer: s2-spine2
    description: s2-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 10
    metadata:
      tenants:
      - ATD_DC
    rd: 10.1.0.115:10010
    route_targets:
      both:
      - 10010:10010
    redistribute_routes:
    - learned
  - id: 20
    metadata:
      tenants:
      - ATD_DC
    rd: 10.1.0.115:10020
    route_targets:
      both:
      - 10020:10020
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-LOCAL-PEERS
      activate: true
    route:
      import_match_failure_action: discard
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPV4-UNDERLAY-PEER
      activate: true
    - name: IPV4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-LOCAL-PEERS
      activate: false
  vrfs:
  - name: A
    rd: 10.1.0.115:50001
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - 50001:50001
      export:
      - address_family: evpn
        route_targets:
        - 50001:50001
    router_id: 10.1.0.115
    updates:
      wait_install: true
    neighbors:
    - ip_address: 192.2.2.229
      peer_group: MLAG-IPV4-UNDERLAY-PEER
      description: s2-leaf4_Vlan4001
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
spanning_tree:
  edge_port:
    bpduguard_default: true
  mode: rapid-pvst
  no_spanning_tree_vlan: 4093-4094
  rapid_pvst_instances:
  - id: 1-4094
    priority: 0
static_routes:
- vrf: default
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 192.1.1.228/31
  mtu: 9214
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 192.0.0.228/31
  mtu: 9214
  no_autostate: true
- name: Vlan10
  description: ten
  shutdown: false
  vrf: A
  ip_address_virtual: 10.10.10.1/24
  mtu: 9014
  metadata:
    tenants:
    - ATD_DC
    tags:
    - DC
- name: Vlan20
  description: twenty
  shutdown: false
  vrf: A
  ip_address_virtual: 10.20.20.1/24
  mtu: 9014
  metadata:
    tenants:
    - ATD_DC
    tags:
    - DC
- name: Vlan4001
  description: MLAG_L3_VRF_A
  shutdown: false
  vrf: A
  ip_address: 192.2.2.228/31
  mtu: 9214
  metadata:
    tenants:
    - ATD_DC
    type: underlay_peering
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 10
  name: ten
  metadata:
    tenants:
    - ATD_DC
- id: 20
  name: twenty
  metadata:
    tenants:
    - ATD_DC
- id: 4001
  name: MLAG_L3_VRF_A
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - ATD_DC
vrfs:
- name: default
