aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet2
  description: P2P_s2-leaf1_Ethernet2
  shutdown: false
  mtu: 9214
  ip_address: 10.255.1.196/31
  metadata:
    peer: s2-leaf1
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet3
  description: P2P_s2-leaf2_Ethernet2
  shutdown: false
  mtu: 9214
  ip_address: 10.255.1.204/31
  metadata:
    peer: s2-leaf2
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet4
  description: P2P_s2-leaf3_Ethernet2
  shutdown: false
  mtu: 9214
  ip_address: 10.255.1.200/31
  metadata:
    peer: s2-leaf3
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet5
  description: P2P_s2-leaf4_Ethernet2
  shutdown: false
  mtu: 9214
  ip_address: 10.255.1.208/31
  metadata:
    peer: s2-leaf4
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
hostname: s2-spine1
ip_routing: true
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.1.0.110/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: default
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.20/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: ceos
  fabric_name: dc2_fabric
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.1.0.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65100'
  router_id: 10.1.0.110
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp_defaults:
  - no bgp default ipv4-unicast
  - distance bgp 20 200 200
  - neighbor default send-community
  - graceful-restart restart-time 300
  - graceful-restart
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPV4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    password: X/OrLne2MxtUwJOXyoEcEw==
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-LOCAL-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    password: HwsUtvRBaFIOmUOBhrtIfQ==
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.1.197
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: s2-leaf1
    description: s2-leaf1_Ethernet2
  - ip_address: 10.255.1.205
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: s2-leaf2
    description: s2-leaf2_Ethernet2
  - ip_address: 10.255.1.201
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: s2-leaf3
    description: s2-leaf3_Ethernet2
  - ip_address: 10.255.1.209
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: s2-leaf4
    description: s2-leaf4_Ethernet2
  - ip_address: 10.1.0.114
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65101'
    metadata:
      peer: s2-leaf1
    description: s2-leaf1_Loopback0
  - ip_address: 10.1.0.116
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65101'
    metadata:
      peer: s2-leaf2
    description: s2-leaf2_Loopback0
  - ip_address: 10.1.0.115
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65102'
    metadata:
      peer: s2-leaf3
    description: s2-leaf3_Loopback0
  - ip_address: 10.1.0.117
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65102'
    metadata:
      peer: s2-leaf4
    description: s2-leaf4_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-LOCAL-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPV4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-LOCAL-PEERS
      activate: false
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: none
static_routes:
- vrf: default
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: default
  ip_routing: false
