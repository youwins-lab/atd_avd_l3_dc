!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname s2-leaf3
!
spanning-tree mode rapid-pvst
no spanning-tree vlan-id 4093-4094
spanning-tree edge-port bpduguard default
spanning-tree vlan-id 1-4094 priority 0
!
vlan 10
   name ten
!
vlan 20
   name twenty
!
vlan 4001
   name MLAG_L3_VRF_A
   trunk group MLAG
!
vlan 4093
   name MLAG_L3
   trunk group MLAG
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance A
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf default
      no shutdown
!
interface Port-Channel4
   description SERVER_s2-host2
   no shutdown
   switchport trunk allowed vlan 10,20
   switchport mode trunk
   switchport
   mlag 4
!
interface Port-Channel1000
   description MLAG_s2-leaf4_Port-Channel1000
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description MLAG_s2-leaf4_Ethernet1
   no shutdown
   channel-group 1000 mode active
!
interface Ethernet2
   description P2P_s2-spine1_Ethernet4
   no shutdown
   mtu 9214
   no switchport
   ip address 10.255.1.201/31
!
interface Ethernet3
   description P2P_s2-spine2_Ethernet4
   no shutdown
   mtu 9214
   no switchport
   ip address 10.255.1.203/31
!
interface Ethernet4
   description SERVER_s2-host2_Ethernet1
   no shutdown
   channel-group 4 mode active
!
interface Ethernet6
   description MLAG_s2-leaf4_Ethernet6
   no shutdown
   channel-group 1000 mode active
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.1.0.115/32
!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   no shutdown
   ip address 10.1.1.115/32
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.24/24
!
interface Vlan10
   description ten
   no shutdown
   mtu 9014
   vrf A
   ip address virtual 10.10.10.1/24
!
interface Vlan20
   description twenty
   no shutdown
   mtu 9014
   vrf A
   ip address virtual 10.20.20.1/24
!
interface Vlan4001
   description MLAG_L3_VRF_A
   no shutdown
   mtu 9214
   vrf A
   ip address 192.2.2.228/31
!
interface Vlan4093
   description MLAG_L3
   no shutdown
   mtu 9214
   ip address 192.1.1.228/31
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 9214
   no autostate
   ip address 192.0.0.228/31
!
interface Vxlan1
   description s2-leaf3_VTEP
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vrf A vni 50001
!
ip virtual-router mac-address 00:1c:73:00:00:01
!
ip routing
ip routing vrf A
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.1.0.0/24 eq 32
   seq 20 permit 10.1.1.0/24 eq 32
!
ip prefix-list PL-MLAG-PEER-VRFS
   seq 10 permit 192.2.2.228/31
!
mlag configuration
   domain-id LeafPair2
   local-interface Vlan4094
   peer-address 192.0.0.229
   peer-link Port-Channel1000
!
ip route 0.0.0.0/0 192.168.0.1
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
route-map RM-CONN-2-BGP-VRFS deny 10
   match ip address prefix-list PL-MLAG-PEER-VRFS
!
route-map RM-CONN-2-BGP-VRFS permit 20
!
route-map RM-MLAG-PEER-IN permit 10
   description Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
   set origin incomplete
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65102
   router-id 10.1.0.115
   update wait-install
   no bgp default ipv4-unicast
   maximum-paths 4
   no bgp default ipv4-unicast
   distance bgp 20 200 200
   neighbor default send-community
   graceful-restart restart-time 300
   graceful-restart
   neighbor EVPN-OVERLAY-LOCAL-PEERS peer group
   neighbor EVPN-OVERLAY-LOCAL-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-LOCAL-PEERS bfd
   neighbor EVPN-OVERLAY-LOCAL-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-LOCAL-PEERS password 7 HwsUtvRBaFIOmUOBhrtIfQ==
   neighbor EVPN-OVERLAY-LOCAL-PEERS send-community
   neighbor EVPN-OVERLAY-LOCAL-PEERS maximum-routes 0
   neighbor IPV4-UNDERLAY-PEERS peer group
   neighbor IPV4-UNDERLAY-PEERS password 7 X/OrLne2MxtUwJOXyoEcEw==
   neighbor IPV4-UNDERLAY-PEERS send-community
   neighbor IPV4-UNDERLAY-PEERS maximum-routes 256000
   neighbor MLAG-IPV4-UNDERLAY-PEER peer group
   neighbor MLAG-IPV4-UNDERLAY-PEER remote-as 65102
   neighbor MLAG-IPV4-UNDERLAY-PEER next-hop-self
   neighbor MLAG-IPV4-UNDERLAY-PEER description s2-leaf4
   neighbor MLAG-IPV4-UNDERLAY-PEER route-map RM-MLAG-PEER-IN in
   neighbor MLAG-IPV4-UNDERLAY-PEER password 7 96Yo/G3L+2RCoAD4Cy/2Ew==
   neighbor MLAG-IPV4-UNDERLAY-PEER send-community
   neighbor MLAG-IPV4-UNDERLAY-PEER maximum-routes 256000
   neighbor 10.1.0.110 peer group EVPN-OVERLAY-LOCAL-PEERS
   neighbor 10.1.0.110 remote-as 65100
   neighbor 10.1.0.110 description s2-spine1_Loopback0
   neighbor 10.1.0.112 peer group EVPN-OVERLAY-LOCAL-PEERS
   neighbor 10.1.0.112 remote-as 65100
   neighbor 10.1.0.112 description s2-spine2_Loopback0
   neighbor 10.255.1.200 peer group IPV4-UNDERLAY-PEERS
   neighbor 10.255.1.200 remote-as 65100
   neighbor 10.255.1.200 description s2-spine1_Ethernet4
   neighbor 10.255.1.202 peer group IPV4-UNDERLAY-PEERS
   neighbor 10.255.1.202 remote-as 65100
   neighbor 10.255.1.202 description s2-spine2_Ethernet4
   neighbor 192.1.1.229 peer group MLAG-IPV4-UNDERLAY-PEER
   neighbor 192.1.1.229 description s2-leaf4_Vlan4093
   redistribute connected route-map RM-CONN-2-BGP
   !
   vlan 10
      rd 10.1.0.115:10010
      route-target both 10010:10010
      redistribute learned
   !
   vlan 20
      rd 10.1.0.115:10020
      route-target both 10020:10020
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-OVERLAY-LOCAL-PEERS activate
      route import match-failure action discard
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-LOCAL-PEERS activate
      neighbor IPV4-UNDERLAY-PEERS activate
      neighbor MLAG-IPV4-UNDERLAY-PEER activate
   !
   vrf A
      rd 10.1.0.115:50001
      route-target import evpn 50001:50001
      route-target export evpn 50001:50001
      router-id 10.1.0.115
      update wait-install
      neighbor 192.2.2.229 peer group MLAG-IPV4-UNDERLAY-PEER
      neighbor 192.2.2.229 description s2-leaf4_Vlan4001
      redistribute connected route-map RM-CONN-2-BGP-VRFS
!
end
