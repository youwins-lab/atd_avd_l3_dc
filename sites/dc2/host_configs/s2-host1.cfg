vlan 10
name ten

vlan 20
name twenty

interface ethernet1
description PortChan1_s2-leaf1_Ethernet4
channel-group 1 mode active
no shutdown

interface ethernet2
description PortChan1_s2-leaf2_Ethernet4
channel-group 1 mode active
no shutdown

interface port-channel1
description MLAG_TO_s2-leaf1_s2-leaf2
no shutdown
switchport mode trunk
switchport trunk allowed vlan 10,20

interface vlan10
description ten
no shutdown
ip address 10.10.10.21/24

interface vlan20
description twenty
no shutdown
ip address 10.20.20.21/24
