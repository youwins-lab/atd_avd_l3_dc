vlan 10
name ten

vlan 20
name twenty

vlan 100
name onehundred

vlan 200
name twohundred

vrf instance 10
vrf instance 20
vrf instance 100
vrf instance 200

ip routing vrf 10
ip routing vrf 20
ip routing vrf 100
ip routing vrf 200

ip route vrf 10 0.0.0.0/0 10.10.10.1
ip route vrf 20 0.0.0.0/0 10.20.20.1
ip route vrf 100 0.0.0.0/0 10.100.100.1
ip route vrf 200 0.0.0.0/0 10.200.200.1

interface ethernet1
description PortChan1_s2-leaf1_Ethernet4
channel-group 1 mode active
no shutdown

interface ethernet2
description PortChan1_s2-leaf2_Ethernet4
channel-group 1 mode active
no shutdown

interface port-channel1
description MLAG_TO_s2-leaf1_s2-leaf2
no shutdown
switchport mode trunk
switchport trunk allowed vlan 10,20,100,200

interface vlan10
description ten
vrf 10
no shutdown
ip address 10.10.10.21/24

interface vlan20
description twenty
vrf 20
no shutdown
ip address 10.20.20.21/24

interface vlan100
description onehundred
vrf 100
no shutdown
ip address 10.100.100.21/24

interface vlan200
description twohundred
vrf 200
no shutdown
ip address 10.200.200.21/24
