      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPV4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-LOCAL-PEERS
      activate: false
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: none
static_routes:
- vrf: default
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
switchport_default:
