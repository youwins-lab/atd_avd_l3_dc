  - ip_address: 10.1.0.4
    peer_group: EVPN-OVERLAY-LOCAL-PEERS
    remote_as: '65099'
    metadata:
      peer: s1-brdr2
    description: s1-brdr2_Loopback0
  - ip_address: 10.1.0.14
