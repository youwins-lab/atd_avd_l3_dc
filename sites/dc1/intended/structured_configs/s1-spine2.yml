loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.1.0.12/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: default
management_interfaces:
- name: Management0
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.11/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: ceos
  fabric_name: dc1_fabric
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.1.0.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65000'
  router_id: 10.1.0.12
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp_defaults:
  - no bgp default ipv4-unicast
  - distance bgp 20 200 200
  - neighbor default send-community
  - graceful-restart restart-time 300
  - graceful-restart
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPV4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    password: X/OrLne2MxtUwJOXyoEcEw==
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-LOCAL-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    password: HwsUtvRBaFIOmUOBhrtIfQ==
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.0.55
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65001'
    metadata:
      peer: s1-leaf1
    description: s1-leaf1_Ethernet3
  - ip_address: 10.255.0.63
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65001'
    metadata:
      peer: s1-leaf2
    description: s1-leaf2_Ethernet3
  - ip_address: 10.255.0.59
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65002'
    metadata:
      peer: s1-leaf3
    description: s1-leaf3_Ethernet3
  - ip_address: 10.255.0.67
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65002'
    metadata:
      peer: s1-leaf4
    description: s1-leaf4_Ethernet3
  - ip_address: 10.255.0.7
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65099'
    metadata:
      peer: s1-brdr1
    description: s1-brdr1_Ethernet3
  - ip_address: 10.255.0.15
    peer_group: IPV4-UNDERLAY-PEERS
    remote_as: '65099'
    metadata:
      peer: s1-brdr2
    description: s1-brdr2_Ethernet3
  - ip_address: 10.1.0.2
